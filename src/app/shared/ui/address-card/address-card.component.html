<div 
  (click)="onSelect()"
  class="relative flex flex-col justify-between p-5 rounded-xl border transition-all duration-200 bg-white h-full"
  [ngClass]="{
    'cursor-pointer hover:shadow-sm': selectable,
    'border-amber-600 bg-amber-50/10 shadow-sm': selectable && selected,
    'border-neutral-200 hover:border-neutral-300': !selected,
    'border-neutral-200': !selectable
  }"
>
  <!-- Selected checkmark (Top Right) -->
  @if (selectable && selected) {
    <div class="absolute -top-3 -right-3 w-6 h-6 rounded-full bg-amber-600 text-white flex items-center justify-center border-2 border-white shadow-sm">
      <mat-icon class="scale-75 font-bold">check</mat-icon>
    </div>
  }

  <div class="flex items-start gap-4 mb-4">
    <!-- Location Icon -->
    <div class="w-10 h-10 rounded-full bg-neutral-100 flex items-center justify-center text-neutral-500 shrink-0">
      <mat-icon class="scale-90">location_on</mat-icon>
    </div>

    <!-- Contact Info & Tags -->
    <div class="flex flex-col gap-1 flex-grow">
      <div class="flex justify-between items-start">
        <span class="font-semibold text-neutral-800 text-base">
          {{ address.contactName }}
        </span>
      </div>
      
      <div class="flex items-center gap-2 mt-0.5">
        <span class="bg-amber-100/50 text-amber-800 border border-amber-200/50 text-[10px] font-bold px-2 py-0.5 rounded tracking-wide uppercase">
          Home
        </span>
        @if (address.isDefault) {
          <span class="text-neutral-400 text-xs flex items-center gap-1">
            <span class="w-1 h-1 rounded-full bg-neutral-300"></span> Default
          </span>
        }
      </div>
    </div>
  </div>

  <!-- Address Details -->
  <div class="text-[0.9rem] text-neutral-500 space-y-1.5 flex-grow mb-4 leading-relaxed">
    <p>{{ address.addressLine }}</p>
    <p>{{ address.city }}, {{ address.state }} - {{ address.postalCode }}</p>
    <p class="pt-1 font-medium text-neutral-600 flex items-center gap-1.5">
      +91 {{ address.mobileNumber }}
    </p>
  </div>

  <!-- Actions Panel (for non-selectable mode, e.g., Profile Page) -->
  @if (!selectable) {
    <div class="flex items-center justify-end gap-1 pt-3 border-t border-neutral-100">
      @if (!address.isDefault) {
        <button 
          mat-button 
          color="accent" 
          class="text-xs scale-90"
          (click)="onSetDefault($event)"
        >
          Set Default
        </button>
      }
      <button 
        mat-icon-button 
        color="primary"
        class="scale-90"
        aria-label="Edit address"
        (click)="onEdit($event)"
      >
        <mat-icon>edit</mat-icon>
      </button>
      <button 
        mat-icon-button 
        color="warn"
        class="scale-90"
        aria-label="Delete address"
        (click)="onDelete($event)"
      >
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  }
</div>
