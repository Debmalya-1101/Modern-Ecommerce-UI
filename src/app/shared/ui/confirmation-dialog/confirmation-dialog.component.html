<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button
    mat-button
    appButtonStyle="secondary"
    type="button"
    (click)="cancel()"
  >
    {{ data.cancelLabel || 'Cancel' }}
  </button>

  <button
    mat-flat-button
    appButtonStyle="primary"
    type="button"
    (click)="confirm()"
  >
    {{ data.confirmLabel || 'Confirm' }}
  </button>
</mat-dialog-actions>
