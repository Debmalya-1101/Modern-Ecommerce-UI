<mat-card class="state-card">
  <div class="empty-content">
    <div class="icon-wrapper">
      <mat-icon>{{ icon }}</mat-icon>
    </div>
    <h3>{{ title }}</h3>
    <p>{{ description }}</p>

    @if (actionLabel) {
      <button
        mat-flat-button
        color="primary"
        type="button"
        class="action-btn"
        (click)="handleAction()"
      >
        {{ actionLabel }}
      </button>
    }
    <ng-content select="[action]"></ng-content>
  </div>
</mat-card>
