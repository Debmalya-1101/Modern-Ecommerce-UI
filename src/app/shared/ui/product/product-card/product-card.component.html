<mat-card class="product-card" appearance="outlined">
  <div class="product-card__media">
    <app-product-image-placeholder
      [src]="product.imageUrl"
      [label]="product.imageLabel"
    />

    <div class="product-card__wishlist">
      <button
        mat-icon-button
        class="wishlist-btn"
        [class.wishlist-btn--active]="isInWishlist()"
        (click)="onToggleWishlist($event)"
        [attr.aria-label]="isInWishlist() ? 'Remove from Wishlist' : 'Add to Wishlist'"
      >
        <mat-icon>{{ isInWishlist() ? 'favorite' : 'favorite_border' }}</mat-icon>
      </button>
    </div>

    @if (product.badge) {
      <div class="product-card__badge">
        <app-product-badge [label]="product.badge" />
      </div>
    }
  </div>

  <div class="product-card__content">
    <div class="product-card__meta">
      @if (product.category) {
        <app-product-category-chip [label]="product.category" />
      }
      @if (product.brand) {
        <span class="product-card__brand">{{ product.brand }}</span>
      }
    </div>

    <h3>{{ product.name }}</h3>

    @if (product.shortDescription) {
      <p class="product-card__description">{{ product.shortDescription }}</p>
    }

    <app-product-rating-display
      [rating]="product.rating"
      [reviewCount]="product.reviewCount"
    />

    <app-product-price-display
      [price]="product.price"
      [originalPrice]="product.originalPrice"
    />

    <div class="product-card__actions">
      <button
        mat-flat-button
        appButtonStyle="primary"
        type="button"
        (click)="onAddToCart($event)"
      >
        Quick Add
      </button>

      <button
        mat-stroked-button
        appButtonStyle="secondary"
        type="button"
        [routerLink]="['/products', product.id]"
      >
        Details
      </button>
    </div>
  </div>
</mat-card>
