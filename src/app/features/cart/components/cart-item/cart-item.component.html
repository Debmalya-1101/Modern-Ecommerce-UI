<div class="cart-item" [class.cart-item--disabled]="disabled">
  <div class="cart-item__media" [routerLink]="['/products', item.productId]">
    <app-product-image-placeholder
      [src]="item.imageUrl"
      [label]="item.productName"
      minHeight="0"
    />
  </div>

  <div class="cart-item__content">
    <div class="cart-item__top">
      <div class="cart-item__details">
        <h3 class="cart-item__title" [routerLink]="['/products', item.productId]">
          {{ item.productName }}
        </h3>
        <div class="cart-item__price-unit">
          {{ item.price | currency:currencyCode:'symbol':'1.0-0' }}
        </div>
      </div>
      <div class="cart-item__price-total">
        {{ item.total | currency:currencyCode:'symbol':'1.0-0' }}
      </div>
    </div>

    <div class="cart-item__bottom">
      <div class="quantity-controls">
        <button
          type="button"
          class="qty-btn"
          aria-label="Decrease quantity"
          [disabled]="disabled"
          (click)="onDecrease()"
        >
          <mat-icon>remove</mat-icon>
        </button>
        <span class="qty-value" [attr.aria-label]="'Quantity ' + item.quantity">
          {{ item.quantity }}
        </span>
        <button
          type="button"
          class="qty-btn"
          aria-label="Increase quantity"
          [disabled]="disabled"
          (click)="onIncrease()"
        >
          <mat-icon>add</mat-icon>
        </button>
      </div>

      <div class="cart-item__actions-right">
        <button
          mat-button
          class="cart-item__action-text"
          aria-label="Save for later"
          [disabled]="disabled"
          (click)="onSaveForLater()"
        >
          <mat-icon>favorite_border</mat-icon>
          <span>Save</span>
        </button>
        <div class="cart-item__action-divider"></div>
        <button
          mat-button
          class="cart-item__action-text cart-item__action-text--delete"
          aria-label="Remove item"
          [disabled]="disabled"
          (click)="onRemove()"
        >
          <mat-icon>delete_outline</mat-icon>
          <span>Remove</span>
        </button>
      </div>
    </div>
  </div>
</div>
